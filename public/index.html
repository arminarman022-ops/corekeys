<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COREKEYS BIH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>COREKEYS</h1>

    <div class="main-container" id="main-menu">
        <div class="category-window" onclick="prikaziSekciju('windows-sekcija')">WINDOWS</div>
        <div class="category-window" onclick="prikaziSekciju('office-sekcija')">OFFICE & ANTIVIRUS</div>
        <div class="category-window" onclick="prikaziSekciju('games-sekcija')">GAMES</div>
    </div>

    <!-- Sekcije proizvoda ostaju iste kao u tvom kodu -->

    <div id="order-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <input type="email" id="user-email" placeholder="Unesite Vaš Email" required>
            <input type="text" id="kliker-kod" placeholder="Kliker bon (14 brojeva)" maxlength="14" required>
            <button class="finish-btn" onclick="posaljiPodatke()">POŠALJI NARUDŽBU</button>
            <button class="cancel-btn" onclick="zatvoriModal()">ODUSTANI</button>
        </div>
    </div>

    <script>
        function prikaziSekciju(id) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }
        function nazad() { location.reload(); }
        function otvoriNarudzbu(naziv) {
            document.getElementById('modal-title').innerText = naziv;
            document.getElementById('order-modal').style.display = 'flex';
        }
        function zatvoriModal() {
            document.getElementById('order-modal').style.display = 'none';
        }

        async function posaljiPodatke() {
            const email = document.getElementById('user-email').value;
            const kod = document.getElementById('kliker-kod').value;
            const artikal = document.getElementById('modal-title').innerText;

            if(kod.length !== 14 || isNaN(kod)) {
                alert("Kliker bon mora imati tačno 14 brojeva!");
                return;
            }

            try {
                // Ispravljena ruta na /send-email
                const res = await fetch('/send-email', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, kod, artikal })
                });
                
                if(res.ok) {
                    alert("Narudžba je uspješno poslana! Provjerite svoj email.");
                    zatvoriModal();
                } else {
                    alert("Greška pri slanju narudžbe.");
                }
            } catch (e) {
                alert("Server nije dostupan.");
            }
        }
    </script>
</body>
</html>
